<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Attendance Management System — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-body">
    <div class="login-container">
      <div class="login-box">
        <div class="auth-brand">
          <span class="auth-logo" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
              <path d="M6 12v5c3 3 9 3 12 0v-5" />
            </svg>
          </span>
          <span class="brand-text">
            <small>CAMS</small>
            <strong>College Attendance</strong>
          </span>
        </div>

        <div class="login-form">
          <h1>Welcome back</h1>
          <p class="auth-sub">
            Sign in to manage and track classroom attendance.
          </p>

          <div class="role-selection">
            <h3>Choose your role</h3>
            <div class="role-buttons">
              <button
                id="teacherLogin"
                class="role-btn teacher-btn"
                type="button"
              >
                <span class="role-ic" aria-hidden="true">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M2 3h20v14H2z" />
                    <path d="M8 21h8M12 17v4" />
                    <path d="M7 8h6M7 12h4" />
                  </svg>
                </span>
                Teacher
              </button>
              <button
                id="studentLogin"
                class="role-btn student-btn"
                type="button"
              >
                <span class="role-ic" aria-hidden="true">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 21a8 8 0 0 1 16 0" />
                  </svg>
                </span>
                Student
              </button>
            </div>
          </div>

          <div id="loginForm" class="login-form-section" style="display: none">
            <h3 id="formTitle">Login</h3>
            <form id="authForm">
              <div class="form-group">
                <label for="username">Username</label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  placeholder="Enter your username"
                  required
                />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                />
              </div>
              <button type="submit" class="login-btn">Sign in</button>
            </form>
          </div>

          <div
            id="errorMessage"
            class="error-message"
            style="display: none"
          ></div>

          <div class="auth-hint">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M12 16v-4M12 8h.01" />
            </svg>
            <span
              >Demo teacher access — username <code>teacher</code> and password
              <code>teacher</code>. Students sign in with their ID, name, or
              email.</span
            >
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
